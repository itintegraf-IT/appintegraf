<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vizitka — Michal Osoba | Integraf</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Georgia, "Times New Roman", Times, serif;
    }
    .card {
      display: flex;
      width: 100%;
      max-width: 520px;
      min-height: 220px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      border-radius: 2px;
    }
    .card__logo {
      flex: 1 1 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 12px 16px 20px;
    }
    .card__logo img {
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .card__divider {
      flex: 0 0 1px;
      align-self: stretch;
      background: #c8c8c8;
      margin: 14px 0;
    }
    .card__text {
      flex: 1 1 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.2em;
      padding: 16px 20px 16px 16px;
      font-size: 14px;
      line-height: 1.35;
      color: #111;
    }
    .card__name {
      font-weight: bold;
      font-size: 1.15em;
      color: #c41230;
      margin: 0;
    }
    .card__title {
      margin: 0;
      font-weight: normal;
    }
    .card__company {
      margin: 0.35em 0 0.5em;
      font-weight: bold;
    }
    .card__address {
      margin: 0;
      font-weight: normal;
    }
    .card__contacts {
      margin-top: 0.5em;
    }
    .card__contacts p {
      margin: 0.15em 0;
    }
    .card__contacts a {
      color: inherit;
      text-decoration: underline;
    }
    @media print {
      body {
        background: #fff;
      }
      .card {
        box-shadow: none;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <article class="card" aria-label="Vizitka">
    <div class="card__logo">
      <img
        src="/vizitka-integraf-logo.png"
        width="200"
        height="200"
        alt="Integraf — logo"
      />
    </div>
    <div class="card__divider" aria-hidden="true"></div>
    <div class="card__text">
      <p class="card__name">Michal Osoba</p>
      <p class="card__title">IT - správce sítě</p>
      <p class="card__company">Integraf, s.r.o.</p>
      <p class="card__address">Myslbekova 273<br />547 01 Náchod</p>
      <div class="card__contacts">
        <p><strong>M:</strong> <a href="tel:+420725267923">+420 725 267 923</a></p>
        <p><strong>E:</strong> <a href="mailto:m.osoba@integraf.cz">m.osoba@integraf.cz</a></p>
        <p><strong>W:</strong> <a href="https://www.integraf.cz" rel="noopener noreferrer">www.integraf.cz</a></p>
      </div>
    </div>
  </article>
</body>
</html>
